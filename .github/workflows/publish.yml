name: Publish to npm

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (must already be verified by the tag-push run)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  verify:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Reject untrusted release inputs before npm bootstrap
        shell: bash
        run: |
          set -euo pipefail
          printf 'GitHub run evidence: run_id=%s run_attempt=%s\n' "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}"
          test "${GITHUB_RUN_ATTEMPT}" = "1"
          test ! -e .npmrc

      - name: Set up exact Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.2
          registry-url: https://registry.npmjs.org

      - name: Set up exact npm
        shell: bash
        run: |
          set -euo pipefail
          npm_prefix="${RUNNER_TEMP}/npm-11.18.0"
          npm_userconfig="${RUNNER_TEMP}/npm-bootstrap-user.npmrc"
          npm_cache="${RUNNER_TEMP}/npm-bootstrap-cache"
          : > "${npm_userconfig}"
          npm --userconfig="${npm_userconfig}" --cache="${npm_cache}" --registry=https://registry.npmjs.org install --prefix "${npm_prefix}" --ignore-scripts --no-save npm@11.18.0
          test "$("${npm_prefix}/node_modules/.bin/npm" --version)" = "11.18.0"
          test "$("${npm_prefix}/node_modules/.bin/npm" --userconfig="${npm_userconfig}" --registry=https://registry.npmjs.org config get registry)" = "https://registry.npmjs.org/"
          echo "${npm_prefix}/node_modules/.bin" >> "${GITHUB_PATH}"

      - name: Verify release source and tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          test "$(node --version)" = "v22.22.2"
          test "$(npm --version)" = "11.18.0"
          test "${{ github.event.repository.private }}" = "false"
          version="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_TYPE}" = "tag"
          test "${GITHUB_REF_NAME}" = "v${version}"
          verification_ref="refs/release-verification/${GITHUB_REF_NAME}"
          git fetch --no-tags origin "refs/tags/${GITHUB_REF_NAME}:${verification_ref}"
          test "$(git cat-file -t "${verification_ref}")" = "tag"
          release_commit="$(git rev-parse "${verification_ref}^{commit}")"
          test "$(git rev-parse HEAD)" = "${release_commit}"
          test "${release_commit}" = "${GITHUB_SHA}"
          git merge-base --is-ancestor "${release_commit}" origin/main
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Audit dependency tree
        run: npm audit --audit-level=high

      - name: Check types
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Rebuild tracked output
        run: npm run build

      - name: Reject generated-output drift
        run: git diff --exit-code -- dist

      - name: Build exact release tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir release
          printf 'run_id=%s\nrun_attempt=%s\n' "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}" > release/RUN_EVIDENCE
          npm pack --ignore-scripts --json --pack-destination release > release/pack-result.json
          node -e 'const fs=require("node:fs");const [result]=JSON.parse(fs.readFileSync("release/pack-result.json","utf8"));fs.appendFileSync(process.env.GITHUB_OUTPUT,`tarball=${result.filename}\n`);'

      - name: Verify exact release tarball
        run: npm run verify:artifact -- "release/${{ steps.pack.outputs.tarball }}" > release/artifact-report.json

      - name: Generate and verify locked release SBOM
        shell: bash
        run: |
          set -euo pipefail
          raw_sbom="release/borgmcp-shared-${{ steps.release.outputs.version }}.raw.cdx.json"
          sbom="release/borgmcp-shared-${{ steps.release.outputs.version }}.cdx.json"
          npm sbom --sbom-format cyclonedx > "${raw_sbom}"
          node scripts/normalize-release-sbom.mjs "${raw_sbom}" "${sbom}"
          rm "${raw_sbom}"
          npm run verify:sbom -- "${sbom}" > release/sbom-report.json

      - name: Record exact release checksums
        working-directory: release
        run: sha512sum "${{ steps.pack.outputs.tarball }}" "borgmcp-shared-${{ steps.release.outputs.version }}.cdx.json" sbom-report.json > SHA512SUMS

      - name: Exercise publish metadata without publishing
        run: npm publish "./release/${{ steps.pack.outputs.tarball }}" --dry-run --ignore-scripts --access public --registry=https://registry.npmjs.org

      - name: Exercise exact tarball in a clean consumer
        shell: bash
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          consumer="${RUNNER_TEMP}/borgmcp-shared-consumer"
          mkdir "${consumer}"
          printf '{"name":"borgmcp-shared-release-consumer","private":true,"version":"0.0.0","dependencies":{"borgmcp-shared":"%s"}}\n' "${VERSION}" > "${consumer}/package.json"
          npm install --prefix "${consumer}" --ignore-scripts --no-save "./release/${TARBALL}"
          npm ls --prefix "${consumer}" --omit=dev --all
          (
            cd "${consumer}"
            node --input-type=module <<'NODE'
          import { createRequire } from 'node:module';
          for (const specifier of [
            'borgmcp-shared',
            'borgmcp-shared/templates',
            'borgmcp-shared/role-section',
            'borgmcp-shared/log-stream-hwm',
            'borgmcp-shared/drone-address',
            'borgmcp-shared/protocol',
            'borgmcp-shared/domain',
            'borgmcp-shared/conformance',
          ]) await import(specifier);
          createRequire(import.meta.url)('borgmcp-shared/package.json');
          NODE
          )

      - name: Upload tarball for security audit
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-release-${{ steps.release.outputs.version }}
          path: |
            release/${{ steps.pack.outputs.tarball }}
            release/artifact-report.json
            release/borgmcp-shared-${{ steps.release.outputs.version }}.cdx.json
            release/sbom-report.json
            release/SHA512SUMS
            release/RUN_EVIDENCE
          if-no-files-found: error
          retention-days: 7

  validate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      ARTIFACT_SR_SHA512: ${{ vars.ARTIFACT_SR_SHA512 }}
      ARTIFACT_SR_RUN_ID: ${{ vars.ARTIFACT_SR_RUN_ID }}
      ARTIFACT_SR_RUN_ATTEMPT: ${{ vars.ARTIFACT_SR_RUN_ATTEMPT }}
    outputs:
      version: ${{ steps.release.outputs.version }}
      tarball: ${{ steps.validate-gate.outputs.tarball }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}

      - name: Reject untrusted release inputs before npm bootstrap
        shell: bash
        run: |
          set -euo pipefail
          printf 'GitHub run evidence: run_id=%s run_attempt=%s\n' "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}"
          test "${GITHUB_RUN_ATTEMPT}" = "1"
          test ! -e .npmrc

      - name: Set up exact Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.2

      - name: Verify immutable release source
        id: release
        shell: bash
        run: |
          set -euo pipefail
          test "$(node --version)" = "v22.22.2"
          test "${{ github.event.repository.private }}" = "false"
          version="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_TYPE}" = "branch"
          test "${GITHUB_REF_NAME}" = "main"
          test "${{ inputs.tag }}" = "v${version}"
          verification_ref="refs/release-verification/${{ inputs.tag }}"
          git fetch --no-tags origin "refs/tags/${{ inputs.tag }}:${verification_ref}"
          test "$(git cat-file -t "${verification_ref}")" = "tag"
          release_commit="$(git rev-parse "${verification_ref}^{commit}")"
          test "$(git rev-parse HEAD)" = "${release_commit}"
          git merge-base --is-ancestor "${release_commit}" origin/main
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "release_commit=${release_commit}" >> "${GITHUB_OUTPUT}"

      - name: Bind SR approval tuple and verify source run
        id: validate-gate
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const runId = process.env.ARTIFACT_SR_RUN_ID;
            const runAttempt = process.env.ARTIFACT_SR_RUN_ATTEMPT;
            const sha512 = process.env.ARTIFACT_SR_SHA512;
            const version = '${{ steps.release.outputs.version }}';
            const expectedTarball = `borgmcp-shared-${version}.tgz`;
            const releaseCommit = '${{ steps.release.outputs.release_commit }}';

            if (!runId || !/^[1-9]\d*$/.test(runId)) {
              core.setFailed('ARTIFACT_SR_RUN_ID is empty or malformed');
              return;
            }
            if (!runAttempt || !/^[1-9]\d*$/.test(runAttempt)) {
              core.setFailed('ARTIFACT_SR_RUN_ATTEMPT is empty or malformed');
              return;
            }
            if (!sha512 || !/^[0-9a-f]{128}$/.test(sha512)) {
              core.setFailed('ARTIFACT_SR_SHA512 is empty or malformed');
              return;
            }

            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: Number(runId),
            });
            if (!run.path.endsWith('/publish.yml')) {
              core.setFailed(`Source run ${runId} workflow path '${run.path}' does not end with /publish.yml`);
              return;
            }
            const expectedRef = 'refs/tags/${{ inputs.tag }}';
            if (run.head_branch !== expectedRef) {
              core.setFailed(`Source run ${runId} head_branch '${run.head_branch}' is not '${expectedRef}'`);
              return;
            }
            if (run.conclusion !== 'success') {
              core.setFailed(`Source run ${runId} conclusion is '${run.conclusion}', expected 'success'`);
              return;
            }
            if (run.run_attempt !== Number(runAttempt)) {
              core.setFailed(`Source run ${runId} run_attempt is ${run.run_attempt}, expected ${runAttempt}`);
              return;
            }

            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: Number(runId),
            });
            const artifactName = `npm-release-${version}`;
            const artifact = artifacts.artifacts.find(a => a.name === artifactName);
            if (!artifact) {
              core.setFailed(`Artifact '${artifactName}' not found in run ${runId}`);
              return;
            }

            const { data: zipStream } = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });
            const fs = require('node:fs');
            const path = require('node:path');
            const { execSync } = require('node:child_process');
            const zipPath = path.join(process.env.RUNNER_TEMP, `artifact-${runId}.zip`);
            const extractDir = path.join(process.env.RUNNER_TEMP, `artifact-${runId}`);
            fs.mkdirSync(extractDir, { recursive: true });
            fs.writeFileSync(zipPath, Buffer.from(zipStream));
            execSync(`unzip -q "${zipPath}" -d "${extractDir}"`);
            const tarballPath = path.join(extractDir, expectedTarball);
            if (!fs.existsSync(tarballPath)) {
              core.setFailed(`Expected tarball '${expectedTarball}' not found in extracted artifact`);
              return;
            }
            const extractedFiles = fs.readdirSync(extractDir);
            const allowedFiles = [
              'SHA512SUMS', 'RUN_EVIDENCE', 'artifact-report.json',
              `borgmcp-shared-${version}.cdx.json`, 'sbom-report.json',
              expectedTarball,
            ];
            const unexpected = extractedFiles.filter(f => !allowedFiles.includes(f));
            if (unexpected.length > 0) {
              core.setFailed(`Unexpected entries in artifact: ${unexpected.join(', ')}`);
              return;
            }

            const crypto = require('node:crypto');
            const hash = crypto.createHash('sha512');
            hash.update(fs.readFileSync(tarballPath));
            const actualSha512 = hash.digest('hex');
            if (actualSha512 !== sha512) {
              core.setFailed(`Tarball SHA-512 mismatch: expected ${sha512}, got ${actualSha512}`);
              return;
            }

            const evidencePath = path.join(extractDir, 'RUN_EVIDENCE');
            if (!fs.existsSync(evidencePath)) {
              core.setFailed('RUN_EVIDENCE missing from artifact');
              return;
            }
            const evidence = fs.readFileSync(evidencePath, 'utf8');
            const evidenceRunId = evidence.match(/^run_id=(.+)$/m)?.[1];
            const evidenceRunAttempt = evidence.match(/^run_attempt=(.+)$/m)?.[1];
            if (evidenceRunId !== runId) {
              core.setFailed(`RUN_EVIDENCE run_id (${evidenceRunId}) does not match ARTIFACT_SR_RUN_ID (${runId})`);
              return;
            }
            if (evidenceRunAttempt !== runAttempt) {
              core.setFailed(`RUN_EVIDENCE run_attempt (${evidenceRunAttempt}) does not match ARTIFACT_SR_RUN_ATTEMPT (${runAttempt})`);
              return;
            }

            core.info(`SR tuple verified: run=${runId} attempt=${runAttempt} checksum=${sha512.slice(0, 16)}...`);
            core.setOutput('tarball', expectedTarball);

  publish:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/borgmcp-shared/v/${{ needs.validate.outputs.version }}
    permissions:
      contents: read
      id-token: write
      actions: read
    env:
      ARTIFACT_SR_SHA512: ${{ vars.ARTIFACT_SR_SHA512 }}
      ARTIFACT_SR_RUN_ID: ${{ vars.ARTIFACT_SR_RUN_ID }}
      ARTIFACT_SR_RUN_ATTEMPT: ${{ vars.ARTIFACT_SR_RUN_ATTEMPT }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}

      - name: Reject untrusted release inputs before npm bootstrap
        shell: bash
        run: |
          set -euo pipefail
          printf 'GitHub run evidence: run_id=%s run_attempt=%s\n' "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}"
          test "${GITHUB_RUN_ATTEMPT}" = "1"
          test ! -e .npmrc

      - name: Set up exact Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.2
          registry-url: https://registry.npmjs.org

      - name: Set up exact npm
        shell: bash
        run: |
          set -euo pipefail
          npm_prefix="${RUNNER_TEMP}/npm-11.18.0"
          npm_userconfig="${RUNNER_TEMP}/npm-bootstrap-user.npmrc"
          npm_cache="${RUNNER_TEMP}/npm-bootstrap-cache"
          : > "${npm_userconfig}"
          npm --userconfig="${npm_userconfig}" --cache="${npm_cache}" --registry=https://registry.npmjs.org install --prefix "${npm_prefix}" --ignore-scripts --no-save npm@11.18.0
          test "$("${npm_prefix}/node_modules/.bin/npm" --version)" = "11.18.0"
          test "$("${npm_prefix}/node_modules/.bin/npm" --userconfig="${npm_userconfig}" --registry=https://registry.npmjs.org config get registry)" = "https://registry.npmjs.org/"
          echo "${npm_prefix}/node_modules/.bin" >> "${GITHUB_PATH}"

      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Audit dependency tree
        run: npm audit --audit-level=high

      - name: Check types
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Rebuild tracked output
        run: npm run build

      - name: Reject generated-output drift
        run: git diff --exit-code -- dist

      - name: Download artifact from SR-approved run
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: npm-release-${{ needs.validate.outputs.version }}
          path: release
          run-id: ${{ env.ARTIFACT_SR_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Re-bind SR approval tuple in publish context
        working-directory: release
        shell: bash
        run: |
          set -euo pipefail

          test -f RUN_EVIDENCE || {
            echo "::error::RUN_EVIDENCE missing from downloaded artifact"
            exit 1
          }
          evidence_run_id="$(grep '^run_id=' RUN_EVIDENCE | cut -d= -f2)"
          evidence_run_attempt="$(grep '^run_attempt=' RUN_EVIDENCE | cut -d= -f2)"
          test "${evidence_run_id}" = "${ARTIFACT_SR_RUN_ID}" || {
            echo "::error::Artifact run_id (${evidence_run_id}) does not match ARTIFACT_SR_RUN_ID (${ARTIFACT_SR_RUN_ID})"
            exit 1
          }
          test "${evidence_run_attempt}" = "${ARTIFACT_SR_RUN_ATTEMPT}" || {
            echo "::error::Artifact run_attempt (${evidence_run_attempt}) does not match ARTIFACT_SR_RUN_ATTEMPT (${ARTIFACT_SR_RUN_ATTEMPT})"
            exit 1
          }
          sha512sum --check SHA512SUMS
          artifact_sha="$(cut -d ' ' -f1 SHA512SUMS)"
          test "${ARTIFACT_SR_SHA512}" = "${artifact_sha}" || {
            echo "::error::ARTIFACT_SR_SHA512 does not match audited tarball checksum"
            exit 1
          }
          echo "SR tuple re-verified in publish context"

      - name: Re-verify exact release tarball
        run: node scripts/verify-packed-artifact.mjs "release/${{ needs.validate.outputs.tarball }}"

      - name: Verify version availability and ownership
        run: node scripts/verify-registry-release.mjs prepublish "release/${{ needs.validate.outputs.tarball }}"
        env:
          ALLOW_UNCLAIMED_FIRST_PUBLISH: ${{ vars.ALLOW_UNCLAIMED_FIRST_PUBLISH }}
          NPM_EXPECTED_OWNER: ${{ vars.NPM_EXPECTED_OWNER }}
          NPM_TOKEN_PRESENT: ${{ secrets.NPM_TOKEN != '' }}

      - name: Publish exact audited tarball with provenance
        run: npm publish "./release/${{ needs.validate.outputs.tarball }}" --ignore-scripts --access public --provenance --registry=https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify registry integrity, ownership, and provenance
        run: node scripts/verify-registry-release.mjs postpublish "release/${{ needs.validate.outputs.tarball }}"
        env:
          GITHUB_SHA: ${{ github.sha }}
          NPM_EXPECTED_OWNER: ${{ vars.NPM_EXPECTED_OWNER }}

      - name: Cryptographically verify registry signatures and attestations
        shell: bash
        run: |
          set -euo pipefail
          mkdir registry-verification
          npm install --prefix registry-verification --ignore-scripts --save-exact "borgmcp-shared@${{ needs.validate.outputs.version }}"
          npm audit signatures --prefix registry-verification
